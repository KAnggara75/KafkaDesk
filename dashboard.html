<!DOCTYPE html>

<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta content="width=device-width, initial-scale=1.0" name="viewport" />
	<title>UI for Apache Kafka - Dashboard</title>
	<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
	<style data-purpose="custom-scrollbar">
		/* Custom scrollbar for a cleaner UI look */
		::-webkit-scrollbar {
			width: 6px;
			height: 6px;
		}

		::-webkit-scrollbar-track {
			background: #f1f1f1;
		}

		::-webkit-scrollbar-thumb {
			background: #cbd5e1;
			border-radius: 10px;
		}

		::-webkit-scrollbar-thumb:hover {
			background: #94a3b8;
		}
	</style>
	<style data-purpose="table-styling">
		/* Subtle table header styling to match screenshot */
		th {
			font-weight: 500;
			color: #64748b;
			text-transform: capitalize;
		}

		td {
			color: #1e293b;
		}
	</style>
</head>

<body class="bg-gray-50 font-sans text-slate-900 overflow-x-hidden">
	<!-- BEGIN: MainHeader -->
	<header class="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-4 sticky top-0 z-50"
		data-purpose="global-header">
		<div class="flex items-center space-x-4">
			<!-- Logo and Brand -->
			<div class="flex items-center space-x-2">
				<div class="w-6 h-6 bg-indigo-600 rounded-sm flex items-center justify-center">
					<svg class="w-4 h-4 text-white fill-current" viewbox="0 0 24 24">
						<path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"></path>
					</svg>
				</div>
				<span class="font-semibold text-sm tracking-tight text-slate-800">UI for Apache Kafka</span>
			</div>
			<!-- Version Info -->
			<div class="flex items-center space-x-1 text-xs text-slate-400">
				<span class="text-indigo-500 font-medium">83b5a60</span>
				<span>v0.7.2</span>
			</div>
		</div>
		<!-- Header Actions -->
		<div class="flex items-center space-x-5 text-slate-500">
			<div class="flex items-center space-x-1 cursor-pointer hover:text-indigo-600">
				<div class="w-5 h-5 rounded-full bg-slate-200 flex items-center justify-center text-[10px] font-bold">A</div>
				<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
					<path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
				</svg>
			</div>
			<a class="hover:text-slate-800" href="#">
				<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
					<path
						d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12">
					</path>
				</svg>
			</a>
			<a class="hover:text-slate-800" href="#">
				<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
					<path
						d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.196.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.06.06 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.086 2.157 2.419 0 1.334-.947 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.086 2.157 2.419 0 1.334-.946 2.419-2.157 2.419z">
					</path>
				</svg>
			</a>
			<div class="flex items-center space-x-2 cursor-pointer hover:text-slate-800">
				<svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewbox="0 0 24 24">
					<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round"
						stroke-linejoin="round" stroke-width="2"></path>
				</svg>
				<span class="text-xs font-semibold">pakaiwa</span>
				<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
					<path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
				</svg>
			</div>
		</div>
	</header>
	<!-- END: MainHeader -->
	<div class="flex min-h-[calc(100vh-3.5rem)]">
		<!-- BEGIN: Sidebar -->
		<aside class="w-56 bg-white border-r border-gray-200 py-4 flex-shrink-0" data-purpose="navigation-sidebar">
			<nav class="space-y-1">
				<!-- Dashboard Link -->
				<a class="flex items-center px-4 py-2 text-sm font-medium text-indigo-600 bg-indigo-50 border-r-4 border-indigo-600"
					data-purpose="nav-item-active" href="#">
					Dashboard
				</a>
				<!-- Dev Cluster Link -->
				<div class="group">
					<button
						class="w-full flex items-center justify-between px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
						<div class="flex items-center">
							<span class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span>
							dev
						</div>
						<svg class="w-4 h-4 text-slate-400 group-hover:text-slate-600" fill="none" stroke="currentColor"
							viewbox="0 0 24 24">
							<path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
						</svg>
					</button>
				</div>
				<!-- Pakaiwa Cluster Link (Expanded) -->
				<div class="space-y-1">
					<button
						class="w-full flex items-center justify-between px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
						<div class="flex items-center">
							<span class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span>
							pakaiwa
						</div>
						<svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
							<path d="M5 15l7-7 7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
						</svg>
					</button>
					<!-- Nested Items -->
					<div class="pl-8 space-y-1">
						<a class="block px-4 py-1.5 text-sm text-slate-500 hover:text-slate-800" href="#">Brokers</a>
						<a class="block px-4 py-1.5 text-sm text-slate-500 hover:text-slate-800" href="#">Topics</a>
						<a class="block px-4 py-1.5 text-sm text-slate-500 hover:text-slate-800" href="#">Consumers</a>
						<a class="block px-4 py-1.5 text-sm text-slate-500 hover:text-slate-800" href="#">ACL</a>
					</div>
				</div>
			</nav>
		</aside>
		<!-- END: Sidebar -->
		<!-- BEGIN: MainContent -->
		<main class="flex-1 p-6" data-purpose="dashboard-content">
			<h1 class="text-2xl font-semibold text-slate-800 mb-6">Dashboard</h1>
			<!-- BEGIN: StatusCards -->
			<section class="flex space-x-4 mb-8" data-purpose="status-summary">
				<!-- Online Card -->
				<div class="bg-white border border-gray-200 rounded-lg p-4 w-40 shadow-sm flex flex-col justify-between">
					<div class="mb-2">
						<span
							class="inline-block px-2 py-0.5 rounded text-[10px] font-bold bg-emerald-100 text-emerald-700">Online</span>
					</div>
					<div class="flex items-baseline">
						<span class="text-xl font-semibold text-slate-800">2</span>
						<span class="ml-1 text-sm text-slate-400">clusters</span>
					</div>
				</div>
				<!-- Offline Card -->
				<div class="bg-white border border-gray-200 rounded-lg p-4 w-40 shadow-sm flex flex-col justify-between">
					<div class="mb-2">
						<span
							class="inline-block px-2 py-0.5 rounded text-[10px] font-bold bg-slate-100 text-slate-500">Offline</span>
					</div>
					<div class="flex items-baseline">
						<span class="text-xl font-semibold text-slate-800">0</span>
						<span class="ml-1 text-sm text-slate-400">clusters</span>
					</div>
				</div>
			</section>
			<!-- END: StatusCards -->
			<!-- BEGIN: FilterSection -->
			<div class="flex items-center space-x-3 mb-4" data-purpose="table-filters">
				<label class="relative inline-flex items-center cursor-pointer">
					<input class="sr-only peer" type="checkbox" value="" />
					<div
						class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600">
					</div>
					<span class="ml-3 text-sm font-medium text-slate-700">Only offline clusters</span>
				</label>
			</div>
			<!-- END: FilterSection -->
			<!-- BEGIN: ClusterTable -->
			<div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden" data-purpose="cluster-list">
				<table class="w-full text-left border-collapse">
					<thead class="bg-white border-b border-gray-200 text-xs">
						<tr>
							<th class="px-4 py-3 font-semibold">
								<div class="flex items-center space-x-1 cursor-pointer hover:text-slate-900">
									<svg class="w-3 h-3" fill="none" stroke="currentColor" viewbox="0 0 24 24">
										<path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" stroke-linecap="round"
											stroke-linejoin="round" stroke-width="2"></path>
									</svg>
									<span>Cluster name</span>
								</div>
							</th>
							<th class="px-4 py-3 font-semibold">
								<div class="flex items-center space-x-1 cursor-pointer hover:text-slate-900">
									<svg class="w-3 h-3" fill="none" stroke="currentColor" viewbox="0 0 24 24">
										<path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" stroke-linecap="round"
											stroke-linejoin="round" stroke-width="2"></path>
									</svg>
									<span>Version</span>
								</div>
							</th>
							<th class="px-4 py-3 font-semibold">
								<div class="flex items-center space-x-1 cursor-pointer hover:text-slate-900">
									<svg class="w-3 h-3" fill="none" stroke="currentColor" viewbox="0 0 24 24">
										<path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" stroke-linecap="round"
											stroke-linejoin="round" stroke-width="2"></path>
									</svg>
									<span>Brokers count</span>
								</div>
							</th>
							<th class="px-4 py-3 font-semibold">
								<div class="flex items-center space-x-1 cursor-pointer hover:text-slate-900">
									<svg class="w-3 h-3" fill="none" stroke="currentColor" viewbox="0 0 24 24">
										<path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" stroke-linecap="round"
											stroke-linejoin="round" stroke-width="2"></path>
									</svg>
									<span>Partitions</span>
								</div>
							</th>
							<th class="px-4 py-3 font-semibold">
								<div class="flex items-center space-x-1 cursor-pointer hover:text-slate-900">
									<svg class="w-3 h-3" fill="none" stroke="currentColor" viewbox="0 0 24 24">
										<path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" stroke-linecap="round"
											stroke-linejoin="round" stroke-width="2"></path>
									</svg>
									<span>Topics</span>
								</div>
							</th>
							<th class="px-4 py-3 font-semibold">
								<div class="flex items-center space-x-1 cursor-pointer hover:text-slate-900">
									<svg class="w-3 h-3" fill="none" stroke="currentColor" viewbox="0 0 24 24">
										<path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" stroke-linecap="round"
											stroke-linejoin="round" stroke-width="2"></path>
									</svg>
									<span>Production</span>
								</div>
							</th>
							<th class="px-4 py-3 font-semibold">
								<div class="flex items-center space-x-1 cursor-pointer hover:text-slate-900">
									<svg class="w-3 h-3" fill="none" stroke="currentColor" viewbox="0 0 24 24">
										<path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" stroke-linecap="round"
											stroke-linejoin="round" stroke-width="2"></path>
									</svg>
									<span>Consumption</span>
								</div>
							</th>
						</tr>
					</thead>
					<tbody class="text-sm divide-y divide-gray-100">
						<!-- Row 1: dev -->
						<tr class="hover:bg-gray-50 transition-colors">
							<td class="px-4 py-4 font-medium text-slate-800">dev</td>
							<td class="px-4 py-4">1.0-UNKNOWN</td>
							<td class="px-4 py-4 text-center">2</td>
							<td class="px-4 py-4">59</td>
							<td class="px-4 py-4 text-center">6</td>
							<td class="px-4 py-4">0 Bytes</td>
							<td class="px-4 py-4">0 Bytes</td>
						</tr>
						<!-- Row 2: pakaiwa -->
						<tr class="hover:bg-gray-50 transition-colors">
							<td class="px-4 py-4 font-medium text-slate-800">pakaiwa</td>
							<td class="px-4 py-4">1.0-UNKNOWN</td>
							<td class="px-4 py-4 text-center">2</td>
							<td class="px-4 py-4">4</td>
							<td class="px-4 py-4 text-center">2</td>
							<td class="px-4 py-4">0 Bytes</td>
							<td class="px-4 py-4">0 Bytes</td>
						</tr>
					</tbody>
				</table>
			</div>
			<!-- END: ClusterTable -->
		</main>
		<!-- END: MainContent -->
	</div>
</body>

</html>
